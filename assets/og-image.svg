<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="0.25" stop-color="#1a0a2e"/>
      <stop offset="0.5" stop-color="#16213e"/>
      <stop offset="0.75" stop-color="#0f3460"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#a855f7" flood-opacity="0.45"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a855f7" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="260" cy="220" rx="420" ry="320" fill="url(#glowPurple)"/>
  <ellipse cx="980" cy="520" rx="420" ry="300" fill="url(#glowPink)"/>

  <!-- glass card -->
  <rect x="160" y="165" width="880" height="300" rx="42" fill="#111827" fill-opacity="0.5"
        stroke="url(#border)" stroke-width="3" filter="url(#cardGlow)"/>

  <!-- title -->
  <text x="250" y="330" font-family="Quicksand" font-weight="700" font-size="104"
        fill="#c084fc" filter="url(#textGlow)">Rustysnek</text>

  <!-- subtitle -->
  <text x="252" y="408" font-family="Quicksand" font-weight="600" font-size="34"
        fill="#9f7fd1">Pascal Jod&#322;owski &#8212; DevOps Engineer</text>

  <!-- penguin -->
  <g transform="translate(890, 300)">
    <ellipse cx="0" cy="78" rx="74" ry="14" fill="#a855f7" opacity="0.25"/>
    <!-- wings -->
    <ellipse cx="-62" cy="18" rx="18" ry="44" fill="#15151d" transform="rotate(14 -62 18)"/>
    <ellipse cx="62" cy="18" rx="18" ry="44" fill="#15151d" transform="rotate(-14 62 18)"/>
    <!-- body -->
    <ellipse cx="0" cy="8" rx="62" ry="76" fill="#15151d"/>
    <!-- belly -->
    <ellipse cx="0" cy="26" rx="42" ry="50" fill="#f3f0fa"/>
    <!-- eyes -->
    <circle cx="-20" cy="-26" r="12" fill="#ffffff"/>
    <circle cx="20" cy="-26" r="12" fill="#ffffff"/>
    <circle cx="-17" cy="-24" r="6" fill="#15151d"/>
    <circle cx="23" cy="-24" r="6" fill="#15151d"/>
    <!-- beak -->
    <path d="M -12 -10 L 12 -10 L 0 6 Z" fill="#fb923c"/>
    <!-- feet -->
    <ellipse cx="-24" cy="80" rx="17" ry="8" fill="#fb923c"/>
    <ellipse cx="24" cy="80" rx="17" ry="8" fill="#fb923c"/>
  </g>
</svg>
